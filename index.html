<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fitness Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header / weekly goals ── */
    .header {
      padding: 20px 16px 16px;
      background: #161616;
      border-bottom: 1px solid #222;
    }
    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .week-range { font-size: 12px; color: #555; }
    .week-hint { font-size: 11px; color: #383838; margin-top: 10px; text-align: center; }

    .goals { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .goal-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 11px 12px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }
    .goal-card.complete { border-color: var(--c); }

    .goal-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #555;
      margin-bottom: 3px;
    }
    .goal-row {
      display: flex;
      align-items: baseline;
      gap: 2px;
      margin-bottom: 7px;
    }
    .goal-count { font-size: 24px; font-weight: 700; color: var(--c); line-height: 1; }
    .goal-denom { font-size: 13px; color: #444; }

    .goal-bar { height: 3px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .goal-bar-fill { height: 100%; border-radius: 2px; background: var(--c); transition: width 0.4s; }

    /* ── Calendar ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 10px;
    }
    .cal-nav h2 { font-size: 16px; font-weight: 600; }
    .nav-btn {
      background: #1e1e1e;
      border: none;
      color: #aaa;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .nav-btn:active { background: #2a2a2a; }

    .cal-grid { padding: 0 16px 12px; }

    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      margin-bottom: 6px;
    }
    .day-header { font-size: 11px; color: #444; padding: 2px 0; }

    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

    .day {
      min-height: 50px;
      background: #161616;
      border-radius: 8px;
      padding: 5px 3px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .day:active { background: #2a2a2a; }
    .day.other-month { opacity: 0.2; pointer-events: none; }
    .day.today { background: #1e1e1e; outline: 1.5px solid #333; }
    .day.in-selected-week { background: #1e1e1e; }
    .day.selected { background: #252525; outline: 1.5px solid #444; }

    .day-num {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      margin-bottom: 4px;
    }
    .day.today .day-num { color: #60a5fa; font-weight: 700; }

    .workout-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      justify-content: center;
      min-height: 10px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 4px 16px 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #666;
    }

    /* ── Import ── */
    .import-section { padding: 4px 16px 40px; }
    .import-btn {
      width: 100%;
      padding: 14px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #aaa;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .import-btn:active { background: #2a2a2a; }
    .last-import {
      text-align: center;
      font-size: 11px;
      color: #3a3a3a;
      margin-top: 8px;
    }
    #file-input { display: none; }

    /* ── Type colors as CSS vars ── */
    .t-strength { --c: #9B72F5; }
    .t-running  { --c: #F472B6; }
    .t-core     { --c: #FB923C; }
    .t-mobility { --c: #2DD4BF; }
    .t-other    { --c: #4B5563; }

    .dot-strength { background: #9B72F5; }
    .dot-running  { background: #F472B6; }
    .dot-core     { background: #FB923C; }
    .dot-mobility { background: #2DD4BF; }
    .dot-other    { background: #4B5563; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      color: #ccc;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <h1>This Week</h1>
      <span class="week-range" id="week-range"></span>
    </div>
    <div class="goals" id="goals"></div>
    <div class="week-hint">Tap any day to see that week</div>
  </div>

  <div class="cal-nav">
    <button class="nav-btn" id="prev-month">&#8249;</button>
    <h2 id="month-label"></h2>
    <button class="nav-btn" id="next-month">&#8250;</button>
  </div>

  <div class="cal-grid">
    <div class="day-headers">
      <div class="day-header">Su</div>
      <div class="day-header">Mo</div>
      <div class="day-header">Tu</div>
      <div class="day-header">We</div>
      <div class="day-header">Th</div>
      <div class="day-header">Fr</div>
      <div class="day-header">Sa</div>
    </div>
    <div class="days" id="days"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot dot-strength"></div>Strength</div>
    <div class="legend-item"><div class="dot dot-running"></div>Running</div>
    <div class="legend-item"><div class="dot dot-core"></div>Core</div>
    <div class="legend-item"><div class="dot dot-mobility"></div>Mobility</div>
    <div class="legend-item"><div class="dot dot-other"></div>Other</div>
  </div>

  <div class="import-section">
    <button class="import-btn" onclick="document.getElementById('file-input').click()">
      &#8593; Import JEFIT CSV Export
    </button>
    <div class="last-import" id="last-import"></div>
    <input type="file" id="file-input" accept=".csv,.txt" onchange="handleFile(event)">
  </div>

  <div class="toast" id="toast"></div>

<script>
  // ── Pre-loaded data (last export: 2026-06-06) ───────────────────────────
  const SEEDED_DATA = {"2023-08-15": ["strength"], "2023-08-21": ["running"], "2023-08-23": ["running"], "2023-08-24": ["strength"], "2023-11-01": ["running"], "2023-11-03": ["running"], "2023-11-06": ["running"], "2023-11-15": ["running"], "2023-11-17": ["running"], "2023-11-20": ["running"], "2023-11-22": ["running"], "2023-11-27": ["running"], "2023-11-28": ["running"], "2023-12-07": ["running"], "2023-12-12": ["running"], "2023-12-17": ["running"], "2023-12-20": ["running"], "2023-12-24": ["running"], "2023-12-28": ["running"], "2023-12-30": ["running"], "2024-01-06": ["running"], "2024-01-09": ["running"], "2024-01-16": ["running"], "2024-01-18": ["running"], "2024-01-19": ["running"], "2024-01-23": ["running"], "2024-01-29": ["running"], "2024-01-31": ["running"], "2024-02-04": ["running"], "2024-02-05": ["strength"], "2024-02-09": ["running"], "2024-02-17": ["running"], "2024-02-19": ["strength"], "2024-02-23": ["running"], "2024-02-28": ["running"], "2024-03-01": ["running"], "2024-03-04": ["running"], "2024-03-05": ["strength"], "2024-03-08": ["running"], "2024-03-10": ["running"], "2024-03-12": ["running"], "2024-03-15": ["running"], "2024-03-18": ["running"], "2024-03-26": ["running"], "2024-04-03": ["running"], "2024-04-05": ["strength"], "2024-04-06": ["running"], "2024-04-09": ["running"], "2024-04-12": ["running"], "2024-04-16": ["running"], "2024-04-22": ["running"], "2024-04-25": ["running"], "2024-04-29": ["running"], "2024-05-10": ["running"], "2024-05-15": ["running"], "2024-05-22": ["running"], "2024-05-30": ["running"], "2024-06-02": ["running"], "2024-06-17": ["running"], "2024-06-18": ["strength"], "2024-06-21": ["running"], "2024-07-03": ["running"], "2024-07-04": ["strength"], "2024-07-06": ["strength"], "2024-07-12": ["running"], "2024-07-21": ["running"], "2024-07-23": ["running"], "2024-07-25": ["strength"], "2024-07-26": ["running"], "2024-07-28": ["strength"], "2024-08-01": ["strength"], "2024-08-10": ["running"], "2024-08-11": ["strength"], "2024-08-13": ["strength"], "2024-08-14": ["running"], "2024-08-21": ["running"], "2024-08-23": ["running"], "2024-08-26": ["strength"], "2024-08-27": ["running"], "2024-08-30": ["running"], "2024-09-13": ["running"], "2024-10-26": ["running"], "2024-11-04": ["running"], "2024-11-05": ["running"], "2024-11-08": ["running"], "2024-11-11": ["running"], "2024-11-18": ["running"], "2024-12-03": ["running"], "2024-12-09": ["running"], "2024-12-11": ["running"], "2024-12-26": ["running"], "2024-12-27": ["running"], "2025-01-05": ["running"], "2025-01-07": ["strength"], "2025-01-08": ["running"], "2025-01-11": ["running"], "2025-01-14": ["running"], "2025-01-20": ["running"], "2025-01-27": ["strength"], "2025-01-28": ["running"], "2025-02-03": ["running"], "2025-02-05": ["strength"], "2025-02-08": ["running"], "2025-03-07": ["running"], "2025-07-07": ["running"], "2025-08-13": ["running"], "2025-08-15": ["running"], "2025-08-17": ["strength"], "2025-08-26": ["strength"], "2025-08-28": ["strength"], "2025-09-29": ["strength"], "2025-10-01": ["strength"], "2025-10-03": ["strength"], "2025-10-04": ["running"], "2025-10-06": ["strength"], "2025-10-08": ["strength"], "2025-10-14": ["strength"], "2025-10-16": ["strength"], "2025-10-17": ["strength"], "2025-10-19": ["running"], "2025-10-20": ["strength"], "2025-10-21": ["running"], "2025-10-25": ["strength"], "2025-10-26": ["strength"], "2025-10-27": ["strength"], "2025-11-09": ["strength"], "2025-11-17": ["strength"], "2025-11-18": ["strength"], "2025-11-20": ["running"], "2025-11-22": ["strength"], "2025-11-23": ["running"], "2025-11-25": ["strength"], "2025-11-26": ["strength"], "2025-11-30": ["running"], "2025-12-01": ["running"], "2025-12-02": ["strength"], "2025-12-03": ["strength"], "2025-12-08": ["strength"], "2025-12-10": ["strength"], "2025-12-11": ["strength"], "2026-01-06": ["strength"], "2026-01-08": ["running"], "2026-01-12": ["strength"], "2026-01-13": ["strength"], "2026-01-15": ["running"], "2026-01-17": ["strength"], "2026-01-21": ["strength"], "2026-01-24": ["strength"], "2026-01-28": ["strength"], "2026-01-29": ["strength"], "2026-01-30": ["strength"], "2026-02-02": ["running"], "2026-02-05": ["strength"], "2026-03-02": ["strength"], "2026-03-04": ["strength"], "2026-03-07": ["strength"], "2026-03-23": ["strength"], "2026-03-27": ["strength"], "2026-04-20": ["strength"], "2026-04-22": ["strength"], "2026-04-23": ["strength"], "2026-04-30": ["running"], "2026-05-05": ["strength"], "2026-05-08": ["strength"], "2026-05-18": ["strength"], "2026-05-19": ["strength"], "2026-05-20": ["mobility"], "2026-05-23": ["running"], "2026-05-25": ["strength"], "2026-05-26": ["strength"], "2026-05-27": ["mobility"], "2026-06-03": ["strength"], "2026-06-05": ["strength"]};

  // ── Config ──────────────────────────────────────────────────────────────
  const GOALS = { strength: 3, running: 1, core: 1, mobility: 1 };
  const TYPE_ORDER = ['strength', 'running', 'core', 'mobility', 'other'];

  // ── State ────────────────────────────────────────────────────────────────
  // workoutsByDate: { "2026-05-20": Set<type>, ... }
  let workoutsByDate = {};
  let viewYear, viewMonth;
  let selectedDate = new Date(); // drives the "This Week" goals box

  // ── Init ─────────────────────────────────────────────────────────────────
  function init() {
    const today = new Date();
    viewYear  = today.getFullYear();
    viewMonth = today.getMonth();

    // Start with seeded data
    for (const [date, arr] of Object.entries(SEEDED_DATA)) {
      workoutsByDate[date] = new Set(arr);
    }
    document.getElementById('last-import').textContent = 'Data from export: 2026-06-06';

    // Override with localStorage if it has a newer import
    const saved = localStorage.getItem('jefit_workouts_v2');
    if (saved) {
      const raw = JSON.parse(saved);
      for (const [date, arr] of Object.entries(raw)) {
        workoutsByDate[date] = new Set(arr);
      }
      const lastImport = localStorage.getItem('jefit_last_import');
      if (lastImport) {
        document.getElementById('last-import').textContent = 'Last updated ' + lastImport;
      }
    }

    render();
  }

  // ── Rendering ────────────────────────────────────────────────────────────
  function render() {
    renderGoals();
    renderCalendar();
  }

  function localDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getWeekBounds(anchor) {
    const d   = anchor || selectedDate;
    const sun = new Date(d);
    sun.setDate(d.getDate() - d.getDay());
    sun.setHours(0, 0, 0, 0);
    const sat = new Date(sun);
    sat.setDate(sun.getDate() + 6);
    return { sun, sat };
  }

  function getWeekCounts() {
    const { sun } = getWeekBounds();
    const counts = { strength: 0, running: 0, core: 0, mobility: 0 };
    for (let i = 0; i < 7; i++) {
      const d = new Date(sun);
      d.setDate(sun.getDate() + i);
      const ds = localDateStr(d);
      if (workoutsByDate[ds]) {
        for (const type of workoutsByDate[ds]) {
          if (counts[type] !== undefined) counts[type]++;
        }
      }
    }
    return counts;
  }

  function isCurrentWeek() {
    const today = new Date();
    const { sun, sat } = getWeekBounds();
    return today >= sun && today <= sat;
  }

  function renderGoals() {
    const counts = getWeekCounts();
    const { sun, sat } = getWeekBounds();

    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    document.getElementById('week-range').textContent = fmt(sun) + ' – ' + fmt(sat);

    document.querySelector('.header h1').textContent = isCurrentWeek() ? 'This Week' : 'Week of ' + fmt(sun);

    const LABELS = { strength: 'Strength', running: 'Running', core: 'Core', mobility: 'Mobility' };
    const goalsEl = document.getElementById('goals');
    goalsEl.innerHTML = ['strength', 'running', 'core', 'mobility'].map(type => {
      const count = counts[type];
      const goal  = GOALS[type];
      const pct   = Math.min(100, Math.round((count / goal) * 100));
      const done  = count >= goal;
      return `
        <div class="goal-card t-${type} ${done ? 'complete' : ''}">
          <div class="goal-label">${LABELS[type]}</div>
          <div class="goal-row">
            <div class="goal-count">${count}</div>
            <div class="goal-denom"> / ${goal}</div>
          </div>
          <div class="goal-bar">
            <div class="goal-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join('');
  }

  function renderCalendar() {
    const MONTH_NAMES = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];
    document.getElementById('month-label').textContent =
      MONTH_NAMES[viewMonth] + ' ' + viewYear;

    const today    = new Date();
    const todayStr = localDateStr(today);

    const firstDay    = new Date(viewYear, viewMonth, 1);
    const lastDay     = new Date(viewYear, viewMonth + 1, 0);
    const startOffset = firstDay.getDay();

    const cells = [];

    // Padding from previous month
    for (let i = startOffset - 1; i >= 0; i--) {
      cells.push({ date: new Date(viewYear, viewMonth, -i), other: true });
    }
    // Current month days
    for (let d = 1; d <= lastDay.getDate(); d++) {
      cells.push({ date: new Date(viewYear, viewMonth, d), other: false });
    }
    // Trailing padding to complete last row
    const rem = cells.length % 7;
    if (rem > 0) {
      for (let i = 1; i <= 7 - rem; i++) {
        cells.push({ date: new Date(viewYear, viewMonth + 1, i), other: true });
      }
    }

    const { sun: selSun, sat: selSat } = getWeekBounds();
    const selSunStr = localDateStr(selSun);
    const selSatStr = localDateStr(selSat);
    const selectedStr = localDateStr(selectedDate);

    const daysEl = document.getElementById('days');
    daysEl.innerHTML = cells.map(({ date, other }) => {
      const ds          = localDateStr(date);
      const isToday     = ds === todayStr;
      const isSelected  = ds === selectedStr;
      const inSelWeek   = ds >= selSunStr && ds <= selSatStr;
      const workouts    = workoutsByDate[ds] || new Set();

      const dots = TYPE_ORDER
        .filter(t => workouts.has(t))
        .map(t => `<div class="dot dot-${t}"></div>`)
        .join('');

      const classes = [
        'day',
        other        ? 'other-month'       : '',
        isToday      ? 'today'             : '',
        inSelWeek    ? 'in-selected-week'  : '',
        isSelected   ? 'selected'          : '',
      ].filter(Boolean).join(' ');

      return `
        <div class="${classes}" data-date="${ds}">
          <div class="day-num">${date.getDate()}</div>
          <div class="workout-dots">${dots}</div>
        </div>`;
    }).join('');

    // Attach click handlers
    daysEl.querySelectorAll('.day:not(.other-month)').forEach(el => {
      el.addEventListener('click', () => {
        const [y, m, d] = el.dataset.date.split('-').map(Number);
        selectedDate = new Date(y, m - 1, d);
        render();
      });
    });
  }

  // ── Navigation ───────────────────────────────────────────────────────────
  document.getElementById('prev-month').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('next-month').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  // ── CSV Parsing ──────────────────────────────────────────────────────────
  function parseCSVLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }

  function inferType(name) {
    const n = name.toLowerCase();
    if (n.includes('strength') || n.includes('lift') || n.includes('weight'))
      return 'strength';
    if (n.includes('run') || n.includes('cardio') || n.includes('jog') ||
        n.includes('walk') || n.includes('bike') || n.includes('cycle'))
      return 'running';
    if (n.includes('core') || n.includes('abs') || n.includes('plank'))
      return 'core';
    if (n.includes('mobil') || n.includes('stretch') || n.includes('yoga') ||
        n.includes('flexib'))
      return 'mobility';
    return null;
  }

  function parseJefitCSV(text) {
    const lines = text.split('\n');

    // Split into named sections
    let section = null;
    const sectionLines = {};
    for (const line of lines) {
      const t = line.trim();
      if (!t) continue;
      const m = t.match(/^###\s+(.+?)\s+#+/);
      if (m) { section = m[1].trim(); continue; }
      if (!sectionLines[section]) sectionLines[section] = [];
      sectionLines[section].push(t);
    }

    // Build dayId → type map from ROUTINES section
    const dayTypeMap = {};
    let lastHeader = null;
    for (const line of (sectionLines['ROUTINES'] || [])) {
      if (line.startsWith('row_id,')) {
        lastHeader = line;
        continue;
      }
      if (!lastHeader) continue;

      // Day-level rows have "package" and "dayIndex" in the header
      if (lastHeader.includes('package') && lastHeader.includes('dayIndex')) {
        const cols = lastHeader.split(',').map(c => c.trim());
        const vals = parseCSVLine(line);
        const row  = {};
        cols.forEach((c, i) => row[c] = (vals[i] || '').replace(/"/g, '').trim());

        const id   = parseInt(row['_id']);
        const name = row['name'] || '';
        if (!id || !name) continue;

        const type = inferType(name) || 'other';
        dayTypeMap[id] = type;
      }
    }

    const result = {};

    // Parse WORKOUT SESSIONS → strength / mobility / core
    let sessionHeader = null;
    for (const line of (sectionLines['WORKOUT SESSIONS'] || [])) {
      if (line.startsWith('rowid,') || line.startsWith('row_id,')) { sessionHeader = line; continue; }
      if (!sessionHeader || !line.match(/^\d/)) continue;

      const cols = sessionHeader.split(',').map(c => c.trim());
      const vals = parseCSVLine(line);
      const row  = {};
      cols.forEach((c, i) => row[c] = (vals[i] || '').replace(/"/g, '').trim());

      const dayId     = parseInt(row['day_id']) || 0;
      const starttime = parseInt(row['starttime']);
      if (!starttime || starttime <= 0) continue;

      const type = dayTypeMap[dayId];
      if (!type || type === 'other') continue; // only log known types from sessions

      const ds = localDateStr(new Date(starttime * 1000));
      if (!result[ds]) result[ds] = new Set();
      result[ds].add(type);
    }

    // Parse EXERCISE LOGS → running (ename contains "run")
    // Header: USERID,TIMESTAMP,belongSys,logs,_id,record,mydate,eid,ename,...
    let exHeader = null;
    for (const line of (sectionLines['EXERCISE LOGS'] || [])) {
      if (line.startsWith('USERID,')) { exHeader = line; continue; }
      if (!exHeader || !line.match(/^\d/)) continue;

      const cols = exHeader.split(',').map(c => c.trim());
      const vals = parseCSVLine(line);
      const row  = {};
      cols.forEach((c, i) => row[c] = (vals[i] || '').replace(/"/g, '').trim());

      const ename  = row['ename'] || '';
      const mydate = row['mydate'] || '';
      if (!mydate) continue;

      if (ename.toLowerCase().includes('run')) {
        if (!result[mydate]) result[mydate] = new Set();
        result[mydate].add('running');
      }
    }

    // Parse CARDIO LOGS → running (eid=317 is Running based on exercise log cross-ref)
    // Header: row_id,TIMESTAMP,USERID,_id,weeklyLogId,eid,belongSys,lap,duration,speed,distance,calorie,mydate
    let cardioHeader = null;
    for (const line of (sectionLines['CARDIO LOGS'] || [])) {
      if (line.startsWith('row_id,')) { cardioHeader = line; continue; }
      if (!cardioHeader || !line.match(/^\d/)) continue;

      const cols = cardioHeader.split(',').map(c => c.trim());
      const vals = parseCSVLine(line);
      const row  = {};
      cols.forEach((c, i) => row[c] = (vals[i] || '').replace(/"/g, '').trim());

      const eid    = parseInt(row['eid']);
      const mydate = row['mydate'] || '';
      if (!mydate) continue;

      if (eid === 317) {
        if (!result[mydate]) result[mydate] = new Set();
        result[mydate].add('running');
      }
    }

    return result;
  }

  // ── File Import ──────────────────────────────────────────────────────────
  function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      try {
        workoutsByDate = parseJefitCSV(e.target.result);

        // Persist — convert Sets to arrays for JSON
        const serializable = {};
        for (const [date, set] of Object.entries(workoutsByDate)) {
          serializable[date] = [...set];
        }
        localStorage.setItem('jefit_workouts_v2', JSON.stringify(serializable));

        const now = new Date().toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
        });
        localStorage.setItem('jefit_last_import', now);
        document.getElementById('last-import').textContent = 'Last updated ' + now;

        render();
        showToast('Calendar updated!');
      } catch (err) {
        showToast('Could not read file — try re-exporting from JEFIT');
        console.error(err);
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Go ───────────────────────────────────────────────────────────────────
  init();
</script>
